<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>

<body style=" font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 24px;">
    <h1 style="margin-bottom: 10px;">Contact Us.</h1>
    <p style="color: orangered;">Any Query. Reach out to us...</p>
    <div style="border-radius: 5px; padding: 10px;  width: 400px; box-shadow: rgba(0, 0, 0, 0.15) 1.95px 1.95px 2.6px;">
        <form style="display: flex; flex-direction: column; gap: 20px; padding: 40px;">
            <input type="text" placeholder="Enter Your Name." style="padding: 10px; border-top-color: orangered; border-radius: 5px;">
            <input type="number" placeholder="Enter Your Contact Numer." style="padding: 10px; border-top-color: orangered; border-radius: 5px;">
            <input type="Email" placeholder="Enter Your Valid Email" style="padding: 10px; border-top-color: orangered; border-radius: 5px;">
            <textarea name="reason" id="reason" placeholder="Enter Your reason." style="padding: 10px; border-top-color: orangered; border-radius: 5px;"></textarea>
            <button style="border-top-color: orangered; padding: 10px; border-radius: 5px;">Submit</button>
        </form>
    </div>
</body>
</html>
