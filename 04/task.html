<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyWord</title>
</head>
<style>
    .board {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
    }
    .row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    .key {
        width: 50px;
        height: 50px;
        border: 1px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 5px;
        box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
    }
</style>
<body>
<div class="board">
  <div class="row">
    <div class="key">Esc</div>
    <div class="key">F1</div>
    <div class="key">F2</div>
    <div class="key">F3</div>
    <div class="key">F4</div>
    <div class="key">F5</div>
    <div class="key">F6</div>
    <div class="key">F7</div>
    <div class="key">F8</div>
    <div class="key">F9</div>
    <div class="key">F10</div>
    <div class="key">F11</div>
    <div class="key">F12</div>
    <div class="key">Insect</div>
    <div class="key">printScr</div>
    <div class="key">Delete</div>
  </div>
  <div class="row">
    <div class="key">~</div>
    <div class="key">1</div>
    <div class="key">2</div>
    <div class="key">3</div>
    <div class="key">4</div>
    <div class="key">5</div>
    <div class="key">6</div>
    <div class="key">7</div>
    <div class="key">8</div>
    <div class="key">9</div>
    <div class="key">10</div>
    <div class="key">-</div>
    <div class="key">=</div>
    <div class="key">Backspace</div>
    <div class="key">Home</div>
  </div>
  <div class="row">
    <div class="key tab">Tab</div>
    <div class="key">Q</div>
    <div class="key">W</div>
    <div class="key">E</div>
    <div class="key">R</div>
    <div class="key">T</div>
    <div class="key">Y</div>
    <div class="key">U</div>
    <div class="key">I</div>
    <div class="key">O</div>
    <div class="key">P</div>
    <div class="key">{</div>
    <div class="key">}</div>
    <div class="key">\</div>
    <div class="key">Pg Up</div>
  </div>
  <div class="row">
    <div class="key capslock">Caps Lock</div>
    <div class="key">A</div>
    <div class="key">S</div>
    <div class="key">D</div>
    <div class="key">F</div>
    <div class="key">G</div>
    <div class="key">H</div>
    <div class="key">I</div>
    <div class="key">J</div>
    <div class="key">K</div>
    <div class="key">L</div>
    <div class="key">;</div>
    <div class="key">"</div>
    <div class="key enter">Enter</div>
    <div class="key">Pg Dn</div>
  </div>
  <div class="row">
    <div class="key l-shift">Shift</div>
    <div class="key">Z</div>
    <div class="key">X</div>
    <div class="key">C</div>
    <div class="key">V</div>
    <div class="key">B</div>
    <div class="key">N</div>
    <div class="key">M</div>
    <div class="key">&lt;</div>
    <div class="key">&gt;</div>
    <div class="key">?</div>
    <div class="key r-shift">Shift</div>
    <div class="key">↑</div>
    <div class="key">End</div>
  </div>
  <div class="row">
    <div class="key">Ctrl</div>
    <div class="key">Fn</div>
    <div class="key">Win</div>
    <div class="key">Alt</div>
    <div class="key space">space</div>
    <div class="key">Alt</div>
    <div class="key">Fn</div>
    <div class="key">Ctrl</div><div class="key">←</div><div class="key">↓</div><div class="key">→</div>
  </div>
</div>
</body>
</html>
