<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .parent {
            width: 100px;
            height: 100px;
            display: none; 
            /* display: relative; */
            background-color: blue;
            animation: rotate 4s linear infinite;
            border-radius: 50px;
        }

        .parent:hover {
            transform: scale(2);
        }

        .hole{
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50px;
        }

        @keyframes rotate {
            0% {
               transform: rotate(0deg);
            }
        
            100% {
                transform: rotate(360deg);
               
            }
        }

        .main {
            width: 100%;
            height: 100%;
            border: 1px solid black;
            display: grid;
            grid-template-columns: repeat(5,1fr);
            background-color: aliceblue;
        }
        .main > div {
            width: 100px;
            height: 100px;
            background-color: rgb(0, 255, 110);
            border: 1px solid black;
        }
        @media (max-width: 600px) {
            .main {
                display: grid;
                grid-template-columns: repeat(4,1fr);
            }
        }
        @media (max-width: 450px) {
            .main {
                display: grid;
                grid-template-columns: repeat(3,1fr);
            }
        }
         @media (max-width: 350px) {
            .main {
                display: grid;
                grid-template-columns: repeat(2,1fr);
            }
        }
         @media (max-width: 230px) {
            .main {
                display: grid;
                grid-template-columns: repeat(1,1fr);
            }
        }
    </style>
</head>

<body>
    <div class="parent"><div class="hole"></div></div>
    <div class="main">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>

</html>
