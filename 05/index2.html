<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent-box {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        width: 80%;
        margin: 0 auto;
        border: 2px solid black;
    }
    .parent-box > div {
        background-color: lightblue;
        height: 100px;
        border-radius: 5px;
    }
    .parent-box .box-1 {
        background-color: lightgreen;
        grid-column: span 3;
    }
    .parent-box .box-2 {
        background-color: lightcoral;
        grid-column: span 3;
    }
    .parent-box .box-3 {
        background-color: lightgoldenrodyellow;
        grid-column: span 3;
    }
    .parent-box .box-4 {
        background-color: lightpink;
        grid-column: span 3;
    }
</style>
<body>
    <div class="parent-box">
        <div class="box-1">box 1</div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div class="box-2">box 2</div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div class="box-3">box 3</div>
        <div></div>
        <div></div>
        <div></div>
        <div class="box-4">box 4</div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
